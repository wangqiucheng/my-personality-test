                energyFormula: "能量 = (底层原理掌握度 * 跨界迁移次数) / 碎片信息噪音"
            },
            "环境适应": {
                desc: "你能在极短时间内建立起新秩序。虽然你讨厌无序，但你擅长终结无序。",
                logic: "这是一种‘快速建模’能力。进入新环境后，你会迅速在脑中绘制出一张‘规则图谱’。你的适应不是被动接受，而是主动去理顺逻辑点。",
                scenarios: ["把你丢到一个完全陌生的工作环境，你能在3天内理顺所有的人事层级和流程节奏。", "在异地出差或新城市定居时，你总能比别人更快找到最舒适的生活节奏。"],
                advice: "建议在进入新环境的前两周多观察、少行动，通过‘非正式交流’去理解那些潜规则。",
                energyFormula: "能量 = (环境复杂度 / 秩序建立时间) * 个人心态平衡度"
            },
            "社交影响力": {
                desc: "你的影响力源于“专业背书”。当你推荐一个东西时，周围人会盲目跟从，因为他们知道你经过了严苛筛选。",
                logic: "这是典型的‘信用资产’变现模式。你的底层逻辑是：用极高的决策质量换取他人的跟随成本。",
                scenarios: ["在朋友圈或社交群组分享的好物或经验，经常引起大量的私信询问和跟随购买。", "在关键决策讨论中，你的话往往能起到一锤定音的作用。"],
                advice: "你的公信力是稀缺资源，要像爱惜羽毛一样爱惜它。长期主义的社交影响力才是真正的财富密码。",
                energyFormula: "能量 = (粉丝信任度 * 推荐内容质量) / 营销干扰"
            },
            "团队领导力": {
                desc: "你不是挥斥方遒的将军，你是“带着大家一起赢”的教练。你通过赋能他人来实现目标。",
                logic: "这是一种‘仆人式领导’思维。你认为领导力的本质是‘移除阻碍’。你擅长识别下属的潜能与障碍，激发团队效能。",
                scenarios: ["当下属遇到瓶颈时，你不会只给压力，而是会坐下来和他一起拆解问题，调配资源。", "在团队陷入低谷时，你总能用长远的愿景和务实的鼓励稳住军心。"],
                advice: "建议在关键的业绩冲刺期，适当增强你的‘结果导向’指令，让团队保持高强度的战斗力。",
                energyFormula: "能量 = (成员成长指数 + 团队目标达成度) / 内部管理损耗"
            },
            "艺术审美": {
                desc: "你对生活美学有极高要求，擅长通过细节提升整体质感。",
                logic: "这是一种‘美学溢价’思维。你深知感官体验对心理预期的影响。你的底层逻辑是：在功能性之上，通过仪式感创造价值。",
                scenarios: ["你的工位布置、家居风格甚至是发送的一封商务邮件，都有着统一且高雅的视觉风格。", "在进行产品设计或活动策划时，你对色彩和构图的敏锐直觉总能抓住用户的眼球。"],
                advice: "不要让它变成一种‘刻板的洁癖’。尝试接触一些极简主义或原生态的审美流派。",
                energyFormula: "能量 = 环境视觉质量 + 每日审美体验次数"
            },
            "数理逻辑": {
                desc: "你擅长处理具体的应用逻辑问题，能迅速从复杂的数据中发现异常。",
                logic: "这是‘逻辑一致性’的校验模式。你的大脑对‘不和谐’的数据点极其敏感。你习惯于用公式和模型去简化世界。",
                scenarios: ["面对复杂的财务报表或业务数据，你总能一眼发现那个隐藏在深处的漏洞。", "在制定方案时，你的逻辑推导严丝合缝，让反对者很难找到攻击点。"],
                advice: "逻辑能帮你避坑，但生活不全是公式。理解人的复杂性和非理性，能让你拥有更好的人际温度。",
                energyFormula: "能量 = 数据清晰度 + 逻辑闭环效率 - 非理性噪音干扰"
            }
        };

        let currentQuestionIdx = 0;

        function startTest() {
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('test-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentQuestionIdx];
            document.getElementById('progress-text').innerText = `第 ${currentQuestionIdx + 1} / ${questions.length} 题`;
            const percent = Math.round((currentQuestionIdx / questions.length) * 100);
            document.getElementById('progress-percent').innerText = `${percent}%`;
            document.getElementById('progress-bar').style.width = `${percent}%`;
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('text-A').innerText = q.A;
            document.getElementById('text-B').innerText = q.B;
            document.getElementById('text-C').innerText = q.C;
        }

        function handleAnswer(choice) {
            const q = questions[currentQuestionIdx];
            for (let dim in q.dims) {
                radarScores[dim] += q.dims[dim][choice];
            }
            
            currentQuestionIdx++;
            if (currentQuestionIdx < questions.length) {
                showQuestion();
            } else {
                finishTest();
            }
        }

        function finishTest() {
            document.getElementById('test-screen').classList.add('hidden');
            document.getElementById('loading-screen').classList.remove('hidden');
            
            let msgIdx = 0;
            const msgs = ["正在提取行为偏好...", "正在对齐 12 维潜能矩阵...", "正在计算逻辑底层权重...", "正在生成万字级深度报告..."];
            const interval = setInterval(() => {
                document.getElementById('loading-msg').innerText = msgs[msgIdx++];
                if (msgIdx >= msgs.length) {
                    clearInterval(interval);
                    showResults();
                }
            }, 800);
        }

        function showResults() {
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('report-time').innerText = new Date().toLocaleString();

            // 增加随机动态偏移
            for (let key in radarScores) {
                const randomOffset = (Math.random() * 4 - 2); 
                radarScores[key] = Math.max(10, Math.min(100, Math.round(radarScores[key] + randomOffset)));
            }

            // 计算标签
            let label = "全能探索者";
            if (radarScores["情感共情"] > 75 && radarScores["人事协调"] > 75) label = "和谐守护者";
            else if (radarScores["数理逻辑"] > 75 && radarScores["职场执行力"] > 75) label = "精密策划者";
            else if (radarScores["创新思维"] > 75 && radarScores["学习敏捷度"] > 75) label = "极客创造者";
            else if (radarScores["团队领导力"] > 75 && radarScores["社交影响力"] > 75) label = "魅力领袖者";
            document.getElementById('result-label').innerText = label;

            // 渲染图表
            const ctx = document.getElementById('radarChart').getContext('2d');
            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: Object.keys(radarScores),
                    datasets: [{
                        label: '潜能得分',
                        data: Object.values(radarScores),
                        backgroundColor: 'rgba(79, 70, 229, 0.2)',
                        borderColor: 'rgba(79, 70, 229, 1)',
                        pointBackgroundColor: 'rgba(79, 70, 229, 1)',
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: 'rgba(79, 70, 229, 1)'
                    }]
                },
                options: {
                    scales: {
                        r: {
                            angleLines: { display: false },
                            suggestedMin: 0,
                            suggestedMax: 100
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            });

            // 生成解析
            const detailsDiv = document.getElementById('report-details');
            const sortedDims = Object.entries(radarScores).sort((a, b) => b[1] - a[1]);
            
            sortedDims.forEach(([dim, score]) => {
                const detail = dimensionDetails[dim];
                const card = `
                    <div class="glass rounded-2xl p-6 shadow-md border-l-4 border-indigo-500">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-xl font-bold text-gray-800">${dim}</h3>
                            <span class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full text-sm font-bold">${score}/100</span>
                        </div>
                        <p class="text-gray-700 mb-4 leading-relaxed"><span class="font-bold text-indigo-600">【深度解析】</span>${detail.desc}</p>
                        <p class="text-gray-700 mb-4 leading-relaxed"><span class="font-bold text-indigo-600">【逻辑底层】</span>${detail.logic}</p>
                        <div class="space-y-2 mb-4">
                            ${detail.scenarios.map((s, i) => `<p class="text-sm text-gray-600 bg-gray-50 p-2 rounded-lg border border-gray-100">场景 ${String.fromCharCode(65+i)}: ${s}</p>`).join('')}
                        </div>
                        <p class="text-gray-700 mb-2 leading-relaxed"><span class="font-bold text-indigo-600">💡 个人建议：</span>${detail.advice}</p>
                        <p class="text-sm font-mono text-indigo-500 bg-indigo-50 p-2 rounded-lg">✨ 能量公式: ${detail.energyFormula}</p>
                    </div>
                `;
                detailsDiv.innerHTML += card;
            });
        }

        function downloadReport() {
            const { jsPDF } = window.jspdf;
            const reportElement = document.getElementById('result-screen');
            
            alert('正在生成PDF，请稍候...这可能需要几秒钟。');

            html2canvas(reportElement, {
                scale: 2,
                useCORS: true,
                backgroundColor: '#f3f4f6'
            }).then(canvas => {
                const imgData = canvas.toDataURL('image/png');
                const pdf = new jsPDF({
                    orientation: 'p',
                    unit: 'px',
                    format: [canvas.width, canvas.height]
                });
                pdf.addImage(imgData, 'PNG', 0, 0, canvas.width, canvas.height);
                pdf.save('12维潜能深度解析报告.pdf');
            });
        }
    </script>
